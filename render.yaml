services:
  - type: web
    name: gonzo-ai-agent
    runtime: python
    region: oregon
    buildCommand: ./start.sh build
    startCommand: ./start.sh
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct
      - key: PYTHON_VERSION
        value: 3.12.0
    healthCheckPath: /api/health
    autoDeploy: true
